name: Android Build

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Build debug APKs
        run: gradle assembleDebug

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: android-dual-cast-debug-apks
          path: |
            receiver-app/build/outputs/apk/debug/*.apk
            host-helper/build/outputs/apk/debug/*.apk
            projection-server/build/outputs/aar/*.aar
